name: Daily job sweep

on:
  schedule:
    # 06:30 UTC = 07:30 Irish summer time (IST), 06:30 in winter.
    # Off-peak minute chosen because top-of-hour crons get delayed.
    - cron: "30 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job sweep
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py

      - name: Persist dedup database
        run: |
          git config user.name "job-agent-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -f seen_jobs.db
          git diff --cached --quiet || git commit -m "chore: update seen jobs [skip ci]"
          git push
